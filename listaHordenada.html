<!DOCTYPE html>
<html lang="pt-br">


    <head>
        <title> Lista Ordenada </title>
        <meta charset="utf-8">
    </head>

    <body>

        <h1> Lista Ordenada </h1>
        <!--Diferente da lista não ordenada os tipos do tipe são diferentes, nos definimos os valores 
        o padrão é 1 - ordena em numero, se A ele ordena em alfabeto se maiusculo, maiuscula, 
        se minuscula minuscula, se I - algarismos romano-->

        <!-- 1, A , a, I, i-->
        <ol type="A">
            <li> Comida favorita? </li>
            <li> Carro favorito? </li>
            <li> Serié Favorita </li>
        </ol>

        <h2> Lista de compras</h2>
        <ol type="1">
            <li> Carne </li>
            <li> Feijão </li>
            <li> Macarrão </li>
        </ol>

        <h2> Seculos</h2>
        <ol type="I">
            <li> vinte 1 </li>
            <li> vinte 2 </li>
            <li> vinte 3 </li>
        </ol>


    </body>

</html>
