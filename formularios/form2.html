<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <title> Forms </title>
        <meta charset="utf-8">
    </head>

    <body>

        <h1> Pagina de Formulario </h1>

        <form>

            Loguin: <br>
            <input type="text" name="title"> <br>
            
            Senha: <br>
            <input type="password" name="password"> <br>

            <input type="button" value="Logar">
        </form>


        <h2> Cadastresse </h2>

        <form>
            Loguin: <br>
            <input type="text" name="Loguin"> <br><br>

            sexo: <br>
            <input type="radio" name="sexo" value="M"> Masculino <br>
            <input type="radio" name="sexo" value="F"> Feminino <br><br>


            <h2> Interesses </h2><br>
            <input type="checkbox" name="Interesses"> Futebol<br>
            <input type="checkbox" name="Interesses"> Cursos <br>
            <input type="checkbox" name="Interesses"> Moda <br><br>

            Estado: <br>
            <select name="estado"> 
                <option>SP</option>
                <option>PI</option>
                <option>MG</option>
                <option>SP</option>
            </select><br><br>

            Observações: <br>
            <textarea> </textarea><br>
            <input type="submit" value="Cadastrar">
        </form>

    </body>

</html>
