<!DOCTYPE html>
<html lang="en">
    <head>
        <title> Tabelas </title>
        <meta charset="utf-8">
    </head>

    <body>

        <!--para criar uma table iremos precisar de 3 tags para montar a estrutura (conteúdo | linhas)-->
        <!--Para definir a estrutura da tabela usamos a tag (table)-->
        <!--Para definir as linhas da tabela definimos a tag (tr)-->
        <!--Para defininirmos o conteudo, dados da tabela usamos a tag (td)-->
        <!--para diferenciar o cabeçalho das outras linhas usamos o <teble header (th)-->
        <h2> Produtos </h2>
        <table border="2"> 
            <tr>
                <th> Código </th>
                <th> Produto </th>
                <th> preço </th>
            </tr>

            <tr>
                <td> 001 </td>
                <td> Notebook </td>
                <td> R$ 2.500,99 </td>
            </tr>

            <tr>
                <td> 002 </td>
                <td> Tablet </td>
                <td> R$ 990,99 </td>
            </tr>
        </table>



    </body>


</html>
