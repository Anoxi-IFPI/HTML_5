<!doctype html>
<html lang="pt-br">

    <head>
        <title> Lista Não Ordenada </title>
        <meta charset="utf-8">
    </head>

    <body>

        <!--usado para criar menus-->
        <h2> Lista de compra de Eletronicos </h2>
        <!-- O <u> significa unordenst list lista não ordenada,
        dendtro dela usamos as tags <li> list item que servem fara criar e  listar os itens-->
        <ul>
            <li> Notebook</li>
            <li> Roteador</li>
        </ul>

        <hr> 

        <h2> Mapa do site </h2>
        <!--Atributo type permite definir os tipos de marcadores da lista - circle | squere | disc -->
         <ul type="square">
            <li> Home</li>
            <li> Quem somos </li>
            <li> contatos </li>
        </ul>



    </body>
</html>
