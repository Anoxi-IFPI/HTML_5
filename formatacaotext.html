    <head>
        <title> pagina de formatação </title>
        <meta charset="utf-8">

    <body>
        <!-- a tag (br) e menos indicada que a tag (strong) para deixar um texto em negrito-->
        <strong>Esse é um texto em negrito com strong</strong>
        <br>

        Esse é um texto em <u>underline</u>
        <br>
        Esse é um texto com <strike> strike </strike> 


    </body>

</html>
